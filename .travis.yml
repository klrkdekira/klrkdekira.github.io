# Install the apt prerequisites
# addons:
#   apt:
#     packages:
#       - python-pygments

# Clean and don't fail
install:
  - rm -rf public || exit 0

# Build the website
script:
  - ./binaries/hugo -t hugo_theme_pickles

# Deploy to GitHub pages
deploy:
  provider: pages
  target_branch: master
  skip_cleanup: true
  local_dir: public
  github_token: $GITHUB_TOKEN
  on:
    branch: source
